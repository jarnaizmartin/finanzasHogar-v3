name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 🔴 GATE REAL desde la s.75: 404 → 0 errores de lint por causa raíz
      # (s.74-75), así que se retiró el `continue-on-error`. Un error de lint
      # rompe el CI.
      # ⚠️ Alcance exacto, para no volver a afirmar de más: `eslint .` sale con
      # código 1 ante ERRORES; los WARNINGS (37 hoy, casi todos
      # react-hooks/exhaustive-deps) NO rompen el build. Verificado en s.75
      # introduciendo un error a propósito: exit 1; sin él, exit 0.
      - name: Lint
        run: npm run lint

      # 🔴 GATE REAL desde la s.73: el repo está a 0 errores de tipo. `vite build`
      # NO comprueba tipos (esbuild los borra), así que sin este paso el CI podía
      # estar verde con la app rota.
      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
